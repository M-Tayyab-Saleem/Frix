appId: com.frix.app
name: Phone OTP — Resend OTP After 60 Seconds

---

# Start as guest and navigate to OTP screen
- launchApp:
    appId: com.frix.app
    clearState: true
    clearKeychain: true

- assertVisible:
    text: "Karachi has more to offer than you know."
    timeout: 5000

- tapOn:
    text: "Skip"
    timeout: 3000

- assertVisible:
    id: "explore-screen"
    timeout: 5000

- tapOn:
    id: "venue-card"
    index: 0
    timeout: 5000

- assertVisible:
    id: "venue-detail-screen"
    timeout: 5000

- tapOn:
    id: "get-tickets-button"
    timeout: 3000

- assertVisible:
    id: "soft-auth-gate-modal"
    timeout: 5000

- tapOn:
    text: "Use Phone Number"
    timeout: 3000

- assertVisible:
    id: "phone-input"
    timeout: 3000

- tapOn:
    id: "phone-input"
    timeout: 3000

- inputText: "3001234567"

- tapOn:
    id: "send-otp-button"
    timeout: 3000

- assertVisible:
    id: "otp-verify-screen"
    timeout: 5000

# Verify countdown timer is shown
- assertVisible:
    id: "resend-timer"
    timeout: 3000

# Wait for timer to count down (60 seconds)
# For testing, we can fast-forward time or use a shorter test timer
# In production: wait 60 seconds
- waitForAnimationToEnd:
    timeout: 60000

# Verify "Resend" button becomes active
- assertVisible:
    id: "resend-button"
    timeout: 5000

# Tap Resend
- tapOn:
    id: "resend-button"
    timeout: 3000

# Verify new OTP is sent (timer resets)
- assertVisible:
    id: "resend-timer"
    timeout: 5000

# Timer should be counting down again (new OTP received)
- assertNotVisible:
    id: "resend-button"
    timeout: 3000
