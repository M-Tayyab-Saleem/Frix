# TICKET 044 — Guest Browsing E2E Tests
# Tests: Explore, Map, Search, Home tabs, VenueDetailScreen

appId: com.frix.app
name: Guest Browsing — Explore Tab

---

# Start fresh as guest
- launchApp:
    appId: com.frix.app
    clearState: true
    clearKeychain: true

# Wait for onboarding, then skip
- assertVisible:
    text: "Karachi has more to offer than you know."
    timeout: 5000

- tapOn:
    text: "Skip"
    timeout: 3000

# Verify Explore tab loads
- assertVisible:
    id: "explore-screen"
    timeout: 5000

# Verify venue list loads WITHOUT sign-in prompt
- assertVisible:
    id: "venue-list"
    timeout: 10000

# Verify NO auth modal or sign-in prompt appears
- assertNotVisible:
    text: "Sign in to continue"
    timeout: 2000

- assertNotVisible:
    text: "Create an account"
    timeout: 2000

# Verify category filter chips are visible
- assertVisible:
    id: "category-filter-chips"
    timeout: 3000

# Verify VenueCards are rendered
- assertVisible:
    id: "venue-card"
    timeout: 3000

