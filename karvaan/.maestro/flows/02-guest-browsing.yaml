---
appId: com.frix.app
name: Guest Browsing — Scroll Venue Detail (No Forced Sign-In)

---

# Start as guest and navigate to venue detail
- launchApp:
    appId: com.frix.app
    clearState: true
    clearKeychain: true

- assertVisible:
    text: "Karachi has more to offer than you know."
    timeout: 5000

- tapOn:
    text: "Skip"
    timeout: 3000

- assertVisible:
    id: "explore-screen"
    timeout: 5000

- tapOn:
    id: "venue-card"
    index: 0
    timeout: 5000

- assertVisible:
    id: "venue-detail-screen"
    timeout: 5000

# Scroll through ALL content without forced sign-in
- swipe:
    direction: UP
    percent: 30

- waitForAnimationToEnd:
    timeout: 500

# Verify still on venue detail (no redirect)
- assertVisible:
    id: "venue-detail-screen"
    timeout: 3000

- swipe:
    direction: UP
    percent: 30

- waitForAnimationToEnd:
    timeout: 500

# Verify still on venue detail (no forced sign-in modal)
- assertVisible:
    id: "venue-detail-screen"
    timeout: 3000

- assertNotVisible:
    text: "Create an account to continue"
    timeout: 2000
