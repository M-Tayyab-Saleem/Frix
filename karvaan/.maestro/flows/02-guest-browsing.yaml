appId: com.frix.app
name: Guest Browsing — Search Tab

---

# Start as guest
- launchApp:
    appId: com.frix.app
    clearState: true
    clearKeychain: true

# Skip onboarding
- assertVisible:
    text: "Karachi has more to offer than you know."
    timeout: 5000

- tapOn:
