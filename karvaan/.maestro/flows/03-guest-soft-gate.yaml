appId: com.frix.app
name: Guest Soft Gate — Dismiss with Backdrop Tap

---

# Start as guest and trigger soft gate
- launchApp:
    appId: com.frix.app
    clearState: true
    clearKeychain: true

- assertVisible:
    text: "Karachi has more to offer than you know."
    timeout: 5000

- tapOn:
    text: "Skip"
    timeout: 3000

- assertVisible:
    id: "explore-screen"
    timeout: 5000

- tapOn:
    id: "venue-card"
    index: 0
    timeout: 5000

- assertVisible:
    id: "venue-detail-screen"
    timeout: 5000

- tapOn:
    id: "get-tickets-button"
    timeout: 3000

- assertVisible:
    id: "soft-auth-gate-modal"
    timeout: 5000

# Tap backdrop (outside modal) → modal closes
- tapOn:
    point: 50%,25%
    timeout: 3000

- waitForAnimationToEnd:
    timeout: 500

# Verify modal dismissed
- assertNotVisible:
    id: "soft-auth-gate-modal"
    timeout: 3000

# Verify still on VenueDetailScreen
- assertVisible:
    id: "venue-detail-screen"
    timeout: 3000

