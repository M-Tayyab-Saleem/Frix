# TICKET 044 — Guest Deep Link Resolution E2E Tests
# Tests: frix://venue/:id deep links for guests

appId: com.frix.app
name: Guest Deep Link — Android (App Already Open)

---

# Start as guest
- launchApp:
    appId: com.frix.app
    clearState: true
    clearKeychain: true

- assertVisible:
    text: "Karachi has more to offer than you know."
    timeout: 5000

- tapOn:
    text: "Skip"
    timeout: 3000

- assertVisible:
    id: "explore-screen"
    timeout: 5000

# Simulate deep link opening (app already running)
# Note: In real testing, use: adb shell am start -W -a android.intent.action.VIEW -d 'frix://venue/TEST_VENUE_ID'
- openLink:
    link: frix://venue/test_venue_001

# Wait for navigation
- waitForAnimationToEnd:
    timeout: 2000

# Verify VenueDetailScreen opens (NOT AuthScreen)
- assertVisible:
    id: "venue-detail-screen"
    timeout: 5000

# Verify NOT on AuthScreen
- assertNotVisible:
    text: "Continue with Google"
    timeout: 3000

- assertNotVisible:
    text: "Sign in to continue"
    timeout: 3000

# Verify venue content is visible
- assertVisible:
    id: "venue-name"
    timeout: 3000

