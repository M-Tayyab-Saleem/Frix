appId: com.frix.app
name: Guest Deep Link — iOS (Notes App)

---

# iOS deep link test (manual verification required)
# Steps for manual testing:
# 1. Open Notes app on iPhone
# 2. Type: frix://venue/test_venue_001
# 3. Tap the link
# 4. Verify: VenueDetailScreen opens (NOT AuthScreen)
# 5. Verify: Full venue content visible
# 6. Verify: No auth redirect

# Automated test simulation:
- launchApp:
    appId: com.frix.app
    clearState: true
    clearKeychain: true

- assertVisible:
    text: "Karachi has more to offer than you know."
    timeout: 5000

- tapOn:
    text: "Skip"
    timeout: 3000

# Open deep link
- openLink:
    link: frix://venue/test_venue_001

- waitForAnimationToEnd:
    timeout: 2000

# Verify VenueDetailScreen
- assertVisible:
    id: "venue-detail-screen"
    timeout: 5000

- assertVisible:
    id: "venue-name"
    timeout: 3000

---
appId: com.frix.app
name: Guest Deep Link — Cold Start (App Not Running)

---

# Kill app completely
- stopApp:
    appId: com.frix.app

# Open via deep link (simulates cold start with deep link)
# Note: In real testing, kill app first, then open link from Notes/WhatsApp
# For Maestro, we simulate by launching app and then opening link
- launchApp:
    appId: com.frix.app
    clearState: true
    clearKeychain: true

# SplashScreen should appear first
- assertVisible:
    id: "splash-screen-logo"
    timeout: 3000

# Wait for splash to complete
- waitForAnimationToEnd:
    timeout: 2000

# Now simulate deep link firing after app initializes
- openLink:
    link: frix://venue/test_venue_001

- waitForAnimationToEnd:
    timeout: 3000

# Verify VenueDetailScreen opens (no auth redirect)
- assertVisible:
    id: "venue-detail-screen"
    timeout: 5000

# Verify NOT redirected to AuthScreen
- assertNotVisible:
    id: "auth-screen"
    timeout: 3000

- assertNotVisible:
    text: "Sign in"
    timeout: 3000

